<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Log Prosedur A.M.O</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F7F5F0; --panel:#FFFFFF; --border:#E4E0D5; --chip:#F1EEE5;
    --text:#1C2420; --text2:#2B332F; --text3:#3A4440; --muted:#6B7268; --muted2:#5C6560; --faint:#8A8478;
    --accent:#1C9665; --accent-soft:rgba(28,150,101,0.06); --accent-grad1:#6FE3A8; --accent-grad2:#4FC890; --accent-grad3:#2F8F66;
    --pagi:#F2A93B; --pagi-glow:rgba(242,169,59,0.18);
    --petang:#E2622E; --petang-glow:rgba(226,98,46,0.18);
    --malam:#5B7FE0; --malam-glow:rgba(91,127,224,0.18);
    --warn-bg:#FBF0E8; --warn-border:#E8C9A8; --warn-text:#8A4A1C;
    color-scheme: light only;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{background:var(--bg) !important; color:var(--text); font-family:'IBM Plex Sans',sans-serif; -webkit-tap-highlight-color:transparent;}
  body{
    min-height:100vh;
    background-image:
      linear-gradient(rgba(0,0,0,0.018) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,0,0,0.018) 1px, transparent 1px);
    background-size:28px 28px;
  }
  .font-display{font-family:'Space Grotesk',sans-serif;}
  .font-mono{font-family:'IBM Plex Mono',monospace;}
  button{font-family:inherit; cursor:pointer; border:none; background:none;}
  .wrap{max-width:720px; margin:0 auto; padding:28px 20px 18px;}
  .hidden{display:none !important;}

  /* Header */
  .header{display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:28px;}
  .header .date{font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:0.2em; color:var(--muted); text-transform:uppercase; margin-bottom:6px;}
  .header h1{font-family:'Space Grotesk',sans-serif; font-size:22px; font-weight:700; line-height:1.15; letter-spacing:-0.01em;}
  .header .icon{width:44px; height:44px; border-radius:12px; background:var(--panel); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; flex-shrink:0;}

  /* Sync warning */
  .sync-warn{width:100%; display:flex; align-items:center; gap:10px; background:var(--warn-bg); border:1px solid var(--warn-border); color:var(--warn-text); font-size:14px; padding:12px 16px; border-radius:12px; margin-bottom:24px; text-align:left;}

  /* Loading */
  .loading-screen{display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; gap:12px;}
  .spinner{width:24px; height:24px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-screen span{font-size:14px; color:var(--muted);}

  /* Ring card */
  .ring-card{background:var(--panel); border:1px solid var(--border); border-radius:16px; padding:20px; margin-bottom:28px;}
  .ring-row{display:flex; align-items:center; gap:20px;}
  .ring-box{position:relative; width:168px; height:168px; flex-shrink:0;}
  .ring-center{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;}
  .ring-center .num{font-family:'IBM Plex Mono',monospace; font-size:30px; font-weight:600;}
  .ring-center .lbl{font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:0.05em; margin-top:2px;}
  .ring-legend{flex:1; display:flex; flex-direction:column; gap:10px;}
  .ring-legend-row{display:flex; align-items:center; justify-content:space-between;}
  .ring-legend-left{display:flex; align-items:center; gap:8px;}
  .dot{width:8px; height:8px; border-radius:50%; flex-shrink:0;}
  .ring-legend-row .label{font-size:14px; color:var(--text3);}
  .ring-legend-row .now-tag{font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--muted);}
  .ring-legend-row .count{font-family:'IBM Plex Mono',monospace; font-size:14px; color:var(--text);}

  /* Section */
  .section{margin-bottom:28px;}
  .section h2{font-family:'Space Grotesk',sans-serif; font-size:13px; font-weight:600; text-transform:uppercase; letter-spacing:0.12em; color:var(--muted2); margin-bottom:14px;}
  .empty-note{background:var(--panel); border:1px dashed var(--border); border-radius:12px; padding:20px; text-align:center; font-size:14px; color:var(--faint);}

  /* Bars */
  .bar-row{margin-bottom:14px;}
  .bar-row:last-child{margin-bottom:0;}
  .bar-top{display:flex; align-items:baseline; justify-content:space-between; margin-bottom:6px;}
  .bar-top .name{font-size:14px; font-weight:500; color:var(--text2);}
  .bar-top .count{font-family:'IBM Plex Mono',monospace; font-size:14px; color:var(--muted);}
  .bar-track{height:6px; background:var(--panel); border-radius:99px; overflow:hidden;}
  .bar-fill{height:100%; border-radius:99px; transition:width 0.6s ease-out;}

  /* Trend chart */
  .trend-chart{display:flex; align-items:flex-end; gap:10px; height:128px; padding:8px 4px 0;}
  .trend-col{flex:1; display:flex; flex-direction:column; align-items:center; gap:8px; height:100%; justify-content:flex-end;}
  .trend-count{font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--muted); height:12px;}
  .trend-bar{width:100%; border-radius:5px 5px 0 0; transition:height 0.6s ease-out; min-height:4px;}
  .trend-label{font-size:11px; color:var(--muted);}
  .trend-label.today{color:var(--accent); font-weight:600;}

  /* Case list */
  .case-list{display:flex; flex-direction:column; gap:10px;}
  .case-card{background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:14px;}
  .case-card-row{display:flex; align-items:flex-start; justify-content:space-between; gap:8px;}
  .case-meta{display:flex; align-items:center; gap:8px; margin-bottom:8px;}
  .case-time{font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted);}
  .shift-pill{font-size:11px; padding:2px 8px; border-radius:99px; font-weight:500;}
  .case-procs{display:flex; flex-wrap:wrap; gap:6px;}
  .proc-chip{font-size:12px; background:var(--chip); color:var(--text3); padding:4px 8px; border-radius:6px;}
  .proc-chip .dur{color:var(--faint);}
  .del-btn{flex-shrink:0; width:28px; height:28px; border-radius:6px; display:flex; align-items:center; justify-content:center; color:var(--faint); transition:color 0.15s, background 0.15s;}
  .del-btn:hover{color:#E2622E; background:#FBE8E0;}

  /* FAB */
  .fab{position:static; margin:6px auto 28px; width:78px; height:78px; border-radius:50%; background:#15815A; color:#FFFFFF; display:flex; align-items:center; justify-content:center; box-shadow:0 12px 32px rgba(21,129,90,0.45); transition:transform 0.1s; z-index:40;}
  .fab:active{transform:scale(0.95);}

  /* Modal */
  .modal-overlay{position:fixed; inset:0; background:rgba(0,0,0,0.6); display:flex; align-items:center; justify-content:center; padding:0 24px; z-index:50;}
  .modal-box{background:var(--panel); border:1px solid var(--border); border-radius:16px; padding:20px; max-width:380px; width:100%;}
  .modal-box p{font-size:14px; color:var(--text2); margin-bottom:16px;}
  .modal-actions{display:flex; gap:8px;}
  .modal-btn{flex:1; padding:10px; border-radius:8px; font-size:14px; font-weight:500;}
  .modal-btn.cancel{color:var(--text2); background:var(--chip);}
  .modal-btn.confirm{color:#fff; background:#E2622E;}

  /* Toast */
  .toast{position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--panel); border:1px solid var(--border); color:var(--text); padding:10px 16px; border-radius:99px; font-size:14px; font-weight:500; box-shadow:0 12px 32px rgba(0,0,0,0.18); z-index:60; display:flex; align-items:center; gap:8px; max-width:90%; text-align:center; animation:toastIn 0.25s ease-out;}
  @keyframes toastIn{from{opacity:0; transform:translate(-50%,8px);} to{opacity:1; transform:translate(-50%,0);}}

  /* New case screen */
  .nc-header{display:flex; align-items:center; gap:12px; margin-bottom:24px;}
  .back-btn{width:36px; height:36px; border-radius:8px; background:var(--panel); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; color:var(--text3); flex-shrink:0;}
  .nc-step{font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:0.2em; color:var(--muted); text-transform:uppercase;}
  .nc-title{font-family:'Space Grotesk',sans-serif; font-size:20px; font-weight:700;}

  .shift-option{width:100%; text-align:left; padding:16px; border-radius:12px; border:1px solid var(--border); background:var(--panel); display:flex; align-items:center; gap:12px; margin-bottom:12px; transition:border-color 0.15s, background 0.15s;}
  .shift-option .dot{width:10px; height:10px;}
  .shift-option .shift-name{font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:15px;}
  .shift-option .shift-time{font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--muted); margin-top:2px;}

  .active-shift-tag{display:flex; align-items:center; gap:8px; margin-bottom:16px; font-size:13px; color:var(--muted2);}

  .proc-card{border-radius:12px; border:1px solid var(--border); background:var(--panel); margin-bottom:10px; transition:border-color 0.15s, background 0.15s;}
  .proc-card.selected{border-color:var(--accent); background:var(--accent-soft);}
  .proc-card-btn{width:100%; display:flex; align-items:center; gap:12px; padding:14px; text-align:left;}
  .checkbox{width:20px; height:20px; border-radius:6px; border:2px solid var(--border); display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:border-color 0.15s, background 0.15s;}
  .checkbox.checked{border-color:var(--accent); background:var(--accent);}
  .proc-name{font-size:14px; font-weight:500; color:var(--text2);}
  .dur-row{padding:0 14px 14px; display:flex; flex-wrap:wrap; gap:6px;}
  .dur-chip{font-family:'IBM Plex Mono',monospace; font-size:12px; padding:6px 10px; border-radius:8px; background:var(--chip); color:var(--muted2); border:1px solid var(--border); transition:background 0.15s, color 0.15s;}
  .dur-chip.selected{background:var(--accent); color:#fff; border-color:var(--accent);}

  .save-bar{position:sticky; bottom:0; padding-top:16px; margin-top:16px; background:linear-gradient(to top, var(--bg) 60%, transparent);}
  .save-btn{width:100%; padding:14px; border-radius:12px; font-family:'Space Grotesk',sans-serif; font-weight:600; color:#fff; background:var(--accent); display:flex; align-items:center; justify-content:center; gap:8px; transition:opacity 0.15s;}
  .save-btn:disabled{opacity:0.4;}

  @media (max-width: 520px){
    .wrap{max-width:none; width:100%; padding:18px 8px 14px;}
    .header{margin-bottom:20px; gap:10px; padding:0 2px;}
    .header .date{font-size:12px; letter-spacing:0.13em;}
    .header h1{font-size:26px; line-height:1.1;}
    .header .icon{width:50px; height:50px;}
    .ring-card{padding:16px 12px; margin-bottom:24px;}
    .ring-row{gap:12px;}
    .ring-box{width:188px; height:188px;}
    .ring-box > svg{width:188px; height:188px;}
    .ring-center .num{font-size:38px;}
    .ring-center .lbl{font-size:11px;}
    .ring-legend{gap:13px;}
    .ring-legend-row .label,
    .ring-legend-row .count{font-size:17px;}
    .ring-legend-row .now-tag{font-size:11px;}
    .section{margin-bottom:24px;}
    .section h2{font-size:15px;}
    .bar-top .name,
    .bar-top .count{font-size:17px;}
    .bar-track{height:9px;}
    .trend-chart{height:160px; gap:8px;}
    .trend-count{font-size:12px; height:14px;}
    .trend-label{font-size:13px;}
    .fab{width:88px; height:88px; margin:10px auto 24px;}
    .fab svg{width:42px; height:42px;}
    .shift-option{padding:18px 16px;}
    .shift-option .shift-name{font-size:17px;}
    .shift-option .shift-time{font-size:13px;}
    .proc-card-btn{padding:16px;}
    .proc-name{font-size:16px;}
    .dur-chip{font-size:13px; padding:8px 12px;}
    .save-btn{padding:16px; font-size:16px;}
  }

  @media (max-width: 380px){
    .ring-box{width:180px; height:180px;}
    .ring-box > svg{width:180px; height:180px;}
    .ring-legend-row .label,
    .ring-legend-row .count{font-size:16px;}
  }

  svg{display:block;}
</style>
</head>
<body>

<div id="loading-screen" class="loading-screen">
  <div class="spinner"></div>
  <span>Memuatkan data dari Sheet...</span>
</div>

<div id="dashboard-view" class="wrap hidden"></div>
<div id="newcase-view" class="wrap hidden"></div>

<button id="fab" class="fab hidden" aria-label="Tambah kes baru">
  <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
</button>

<div id="modal-root"></div>
<div id="toast-root"></div>

<script>
// ====================== CONFIG ======================
// IMPORTANT: this must be the exact Web App "/exec" URL from Deploy > Manage
// deployments. We hardcode it rather than deriving from window.location.href,
// because Apps Script's served page can load through an intermediate
// googleusercontent.com proxy URL — using that proxy URL for POST/GET calls
// causes silent failures. Always the *exec* URL, not the dev/HEAD one.
const BASE_URL = "<?= ScriptApp.getService().getUrl() ?>";
const DATA_URL = BASE_URL + "?action=data";

const SHIFTS = [
  { id: "morning", label: "Pagi", time: "07:00 – 14:00", color: "var(--pagi)", hex: "#F2A93B", glow: "var(--pagi-glow)" },
  { id: "evening", label: "Petang", time: "14:00 – 21:00", color: "var(--petang)", hex: "#E2622E", glow: "var(--petang-glow)" },
  { id: "night", label: "Malam", time: "21:00 – 07:00", color: "var(--malam)", hex: "#5B7FE0", glow: "var(--malam-glow)" },
];

const PROCEDURES = [
  "Dressing","T&S","Eye Irrigation","Ambulance Call","Change CBD",
  "Change Ryle's Tube","Blood Taking","Suture Removal (S.T.O)","Blood for TSB","Nail Avulsion",
];

const DURATIONS = [
  { id: "10m", label: "10 min", minutes: 10 },
  { id: "15m", label: "15 min", minutes: 15 },
  { id: "30m", label: "30 min", minutes: 30 },
  { id: "1h", label: "1 jam", minutes: 60 },
  { id: "2h", label: "2 jam", minutes: 120 },
];

function shiftMeta(id){ return SHIFTS.find(s => s.id === id); }
function todayKey(){
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function dateKeyOffset(daysAgo){
  const d = new Date();
  d.setDate(d.getDate() - daysAgo);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function visibleTrendDateKeys(){
  const keys = new Set();
  for(let i=0;i<7;i++) keys.add(dateKeyOffset(i));
  return keys;
}
function normalizeDateKey(value){
  if(!value) return "";
  if(value instanceof Date && !Number.isNaN(value.getTime())){
    return `${value.getFullYear()}-${String(value.getMonth()+1).padStart(2,"0")}-${String(value.getDate()).padStart(2,"0")}`;
  }
  const raw = String(value).trim();
  if(/^\d{4}-\d{1,2}-\d{1,2}T/.test(raw)){
    const parsedIso = new Date(raw);
    if(!Number.isNaN(parsedIso.getTime())){
      return `${parsedIso.getFullYear()}-${String(parsedIso.getMonth()+1).padStart(2,"0")}-${String(parsedIso.getDate()).padStart(2,"0")}`;
    }
  }
  const iso = raw.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if(iso) return `${iso[1]}-${iso[2].padStart(2,"0")}-${iso[3].padStart(2,"0")}`;
  const slash = raw.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if(slash){
    const a = Number(slash[1]);
    const b = Number(slash[2]);
    const year = slash[3];
    const day = a > 12 ? a : b;
    const month = a > 12 ? b : a;
    return `${year}-${String(month).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
  }
  const parsed = new Date(raw);
  if(!Number.isNaN(parsed.getTime())){
    return `${parsed.getFullYear()}-${String(parsed.getMonth()+1).padStart(2,"0")}-${String(parsed.getDate()).padStart(2,"0")}`;
  }
  return raw;
}
function esc(str){
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}
// ====================== STATE ======================
let state = {
  cases: [],
  dashboardDate: todayKey(),
  view: "dashboard", // dashboard | newcase
  step: 1,
  selectedShift: null,
  selectedProcs: {}, // { name: durationId }
  syncError: false,
  saving: false,
};

// ====================== DATA LAYER ======================
async function loadCases(){
  state.dashboardDate = todayKey();
  document.getElementById("loading-screen").classList.remove("hidden");
  document.getElementById("dashboard-view").classList.add("hidden");
  document.getElementById("fab").classList.add("hidden");
  try{
    const res = await fetch(`${DATA_URL}&_=${Date.now()}`, { method: "GET", cache: "no-store" });
    const rows = await res.json();
    const dataRows = rows.slice(1); // skip header
    const grouped = {};
    const trendDateKeys = visibleTrendDateKeys();
    dataRows.forEach((row, idx) => {
      const [ts, date, time, shift, procedure, minutes] = row;
      const dateKey = normalizeDateKey(date);
      if(!trendDateKeys.has(dateKey)) return;
      const key = `${ts}|${dateKey}|${time}|${shift}`;
      if(!grouped[key]){
        grouped[key] = { id: `remote_${idx}_${ts}`, date: dateKey, time, shift, procedures: [] };
      }
      const durMin = Number(minutes);
      const durMatch = DURATIONS.find(d => d.minutes === durMin);
      grouped[key].procedures.push({
        name: procedure,
        minutes: durMin,
        durationLabel: durMatch ? durMatch.label : `${durMin} min`,
      });
    });
    state.cases = Object.values(grouped);
    state.syncError = false;
  }catch(e){
    console.error("Load failed:", e);
    state.syncError = true;
  }
  document.getElementById("loading-screen").classList.add("hidden");
  document.getElementById("fab").classList.remove("hidden");
  renderView();
}

async function saveCase(newCase){
  state.saving = true;
  try{
    const res = await fetch(BASE_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(newCase),
    });
    const resultText = await res.text();
    console.log("POST status:", res.status, "body:", resultText);
    let parsed;
    try{ parsed = JSON.parse(resultText); }catch(_){ parsed = null; }
    if(!res.ok || !parsed || parsed.result !== "success"){
      throw new Error("Server did not confirm success: " + resultText.slice(0,200));
    }
    state.cases.push(newCase);
    state.syncError = false;
    showToast("Kes disimpan ke Google Sheet");
  }catch(e){
    console.error("Save failed:", e);
    state.cases.push(newCase);
    state.syncError = true;
    showToast("Disimpan, tapi gagal sync ke Sheet");
  }
  state.saving = false;
  state.view = "dashboard";
  state.step = 1;
  state.selectedShift = null;
  state.selectedProcs = {};
  renderView();
}

function deleteCaseLocal(id){
  state.cases = state.cases.filter(c => c.id !== id);
  renderView();
}

// ====================== TOAST ======================
function showToast(msg){
  const root = document.getElementById("toast-root");
  root.innerHTML = `<div class="toast">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1C9665" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
    ${esc(msg)}
  </div>`;
  setTimeout(() => { root.innerHTML = ""; }, 3200);
}

// ====================== RENDER: DASHBOARD ======================
function renderDashboard(){
  const today = state.dashboardDate;
  const now = new Date();
  const todayCases = state.cases.filter(c => c.date === today);

  // Stats
  const procCount = {};
  const shiftCount = { morning: 0, evening: 0, night: 0 };
  let totalProcedures = 0;
  todayCases.forEach(c => {
    shiftCount[c.shift] = (shiftCount[c.shift] || 0) + c.procedures.length;
    c.procedures.forEach(p => {
      procCount[p.name] = (procCount[p.name] || 0) + 1;
      totalProcedures++;
    });
  });
  const topProcedures = Object.entries(procCount).sort((a,b) => b[1]-a[1]).slice(0,5);
  const maxProcCount = topProcedures.length ? topProcedures[0][1] : 1;

  // 7-day trend
  const days = [];
  for(let i=6;i>=0;i--){
    const d = new Date();
    d.setDate(d.getDate()-i);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
    const count = state.cases.filter(c => c.date === key).reduce((sum,c) => sum + c.procedures.length, 0);
    days.push({ label: d.toLocaleDateString("ms-MY",{weekday:"short"}).slice(0,3), count, isToday: key === today });
  }
  const maxDay = Math.max(...days.map(d=>d.count), 1);

  const h = now.getHours();
  const currentShiftId = (h>=7 && h<14) ? "morning" : (h>=14 && h<21) ? "evening" : "night";

  // Ring geometry
  const total = Math.max(shiftCount.morning + shiftCount.evening + shiftCount.night, 1);
  const R = 72, CIRC = 2*Math.PI*R, gapLen = (6/360)*CIRC;
  let cursor = 0;
  const arcs = SHIFTS.map(s => {
    const val = shiftCount[s.id] || 0;
    const rawLen = (val/total) * (CIRC - gapLen*3);
    const len = val > 0 ? Math.max(rawLen, 10) : 0;
    const start = cursor;
    cursor += len + gapLen;
    return { ...s, val, len, start };
  });

  const html = `
    <div class="header">
      <div>
        <div class="date">ETD &middot; ${esc(now.toLocaleDateString("ms-MY",{day:"numeric",month:"long",year:"numeric"}))}</div>
        <h1>Log Prosedur Assistan Medical Officer (A.M.O)</h1>
      </div>
      <div class="icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1C9665" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"></path><rect x="9" y="3" width="6" height="4" rx="1"></rect></svg>
      </div>
    </div>

    ${state.syncError ? `
      <button class="sync-warn" onclick="loadCases()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><path d="M2 12c0-1 .4-2 1-3l1.4-1.4"></path><path d="M22 12c0 1-.4 2-1 3l-1.4 1.4"></path><line x1="2" y1="2" x2="22" y2="22"></line></svg>
        <span>Tak dapat sync dengan Google Sheet. Data baru disimpan dalam app sahaja. Tekan untuk cuba lagi.</span>
      </button>
    ` : ""}

    <div class="ring-card">
      <div class="ring-row">
        <div class="ring-box">
          <svg width="168" height="168" viewBox="0 0 168 168" style="transform:rotate(-90deg)">
            <circle cx="84" cy="84" r="${R}" fill="none" stroke="#F1EEE5" stroke-width="14"/>
            ${arcs.map(arc => `
              <circle cx="84" cy="84" r="${R}" fill="none" stroke="${arc.hex}" stroke-width="14" stroke-linecap="round"
                stroke-dasharray="${arc.len} ${CIRC-arc.len}" stroke-dashoffset="${-arc.start}"
                opacity="${arc.id===currentShiftId ? 1 : 0.55}" style="transition:stroke-dasharray 0.7s ease-out"/>
            `).join("")}
          </svg>
          <div class="ring-center">
            <span class="num">${todayCases.length}</span>
            <span class="lbl">kes hari ini</span>
          </div>
        </div>
        <div class="ring-legend">
          ${SHIFTS.map(s => `
            <div class="ring-legend-row">
              <div class="ring-legend-left">
                <span class="dot" style="background:${s.hex}; ${s.id===currentShiftId ? `box-shadow:0 0 0 3px ${s.glow}` : ""}"></span>
                <span class="label">${s.label}</span>
                ${s.id===currentShiftId ? `<span class="now-tag">sekarang</span>` : ""}
              </div>
              <span class="count">${shiftCount[s.id] || 0}</span>
            </div>
          `).join("")}
        </div>
      </div>
    </div>

    <div class="section">
      <h2>Prosedur paling kerap</h2>
      ${topProcedures.length === 0 ? `<div class="empty-note">Belum ada prosedur direkod hari ini.</div>` : `
        ${topProcedures.map(([name,count],i) => `
          <div class="bar-row">
            <div class="bar-top"><span class="name">${esc(name)}</span><span class="count">${count}</span></div>
            <div class="bar-track"><div class="bar-fill" style="width:${Math.max((count/maxProcCount)*100,5)}%; background:${i===0 ? "linear-gradient(90deg,#6FE3A8,#4FC890)" : "#E4E0D5"}"></div></div>
          </div>
        `).join("")}
      `}
    </div>

    <div class="section">
      <h2>Trend 7 hari</h2>
      <div class="trend-chart">
        ${days.map(d => `
          <div class="trend-col">
            <span class="trend-count">${d.count || ""}</span>
            <div class="trend-bar" style="height:${Math.max((d.count/maxDay)*100, d.count>0?6:2)}%; background:${d.isToday ? "linear-gradient(180deg,#6FE3A8,#2F8F66)" : "#E4E0D5"}"></div>
            <span class="trend-label ${d.isToday ? "today" : ""}">${esc(d.label)}</span>
          </div>
        `).join("")}
      </div>
    </div>

  `;

  document.getElementById("dashboard-view").innerHTML = html;
}

// ====================== RENDER: NEW CASE ======================
function renderNewCase(){
  const view = document.getElementById("newcase-view");

  if(state.step === 1){
    view.innerHTML = `
      <div class="nc-header">
        <button class="back-btn" onclick="goBackToDashboard()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </button>
        <div>
          <div class="nc-step">Kes baru &middot; Langkah 1/2</div>
          <div class="nc-title">Pilih shift</div>
        </div>
      </div>
      <div>
        ${SHIFTS.map(s => `
          <button class="shift-option" onclick="selectShift('${s.id}')">
            <span class="dot" style="background:${s.hex}"></span>
            <div>
              <div class="shift-name">${s.label}</div>
              <div class="shift-time">${s.time}</div>
            </div>
          </button>
        `).join("")}
      </div>
    `;
    return;
  }

  // step 2
  const activeShift = shiftMeta(state.selectedShift);
  const selectedCount = Object.keys(state.selectedProcs).length;

  view.innerHTML = `
    <div class="nc-header">
      <button class="back-btn" onclick="state.step=1; renderView();">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
      </button>
      <div>
        <div class="nc-step">Kes baru &middot; Langkah 2/2</div>
        <div class="nc-title">Prosedur & tempoh</div>
      </div>
    </div>
    <div class="active-shift-tag">
      <span class="dot" style="background:${activeShift.hex}; width:8px; height:8px;"></span>
      <span>Shift ${activeShift.label} &middot; ${activeShift.time}</span>
    </div>
    <div>
      ${PROCEDURES.map(name => {
        const isSelected = !!state.selectedProcs[name];
        const safeId = name.replace(/[^a-zA-Z0-9]/g,"_");
        return `
          <div class="proc-card ${isSelected ? "selected" : ""}" id="card_${safeId}">
            <button class="proc-card-btn" onclick="toggleProcedure('${name.replace(/'/g,"\\'")}')">
              <span class="checkbox ${isSelected ? "checked" : ""}">
                ${isSelected ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>` : ""}
              </span>
              <span class="proc-name">${esc(name)}</span>
            </button>
            ${isSelected ? `
              <div class="dur-row">
                ${DURATIONS.map(d => `
                  <button class="dur-chip ${state.selectedProcs[name]===d.id ? "selected" : ""}" onclick="setDuration('${name.replace(/'/g,"\\'")}','${d.id}')">${d.label}</button>
                `).join("")}
              </div>
            ` : ""}
          </div>
        `;
      }).join("")}
    </div>
    <div class="save-bar">
      <button class="save-btn" id="save-btn" ${selectedCount===0 || state.saving ? "disabled" : ""} onclick="handleSaveCase()">
        Simpan kes ${selectedCount>0 ? `(${selectedCount} prosedur)` : ""}
      </button>
    </div>
  `;
}

function selectShift(id){
  state.selectedShift = id;
  state.step = 2;
  renderView();
}

function toggleProcedure(name){
  if(state.selectedProcs[name]){
    delete state.selectedProcs[name];
  }else{
    state.selectedProcs[name] = "15m";
  }
  renderView();
}

function setDuration(name, durId){
  state.selectedProcs[name] = durId;
  renderView();
}

function goBackToDashboard(){
  state.view = "dashboard";
  state.step = 1;
  state.selectedShift = null;
  state.selectedProcs = {};
  renderView();
}

function handleSaveCase(){
  const now = new Date();
  const newCase = {
    id: `case_${now.getTime()}_${Math.random().toString(36).slice(2,7)}`,
    date: todayKey(),
    time: now.toLocaleTimeString("ms-MY",{hour:"2-digit",minute:"2-digit"}),
    shift: state.selectedShift,
    procedures: Object.entries(state.selectedProcs).map(([name,durId]) => {
      const dur = DURATIONS.find(d => d.id === durId);
      return { name, durationId: durId, durationLabel: dur.label, minutes: dur.minutes };
    }),
  };
  saveCase(newCase);
}

// ====================== MAIN RENDER SWITCH ======================
function renderView(){
  const dash = document.getElementById("dashboard-view");
  const nc = document.getElementById("newcase-view");
  const fab = document.getElementById("fab");

  if(state.view === "dashboard"){
    dash.classList.remove("hidden");
    nc.classList.add("hidden");
    fab.classList.remove("hidden");
    renderDashboard();
  }else{
    dash.classList.add("hidden");
    nc.classList.remove("hidden");
    fab.classList.add("hidden");
    renderNewCase();
  }
}

document.getElementById("fab").addEventListener("click", () => {
  state.view = "newcase";
  state.step = 1;
  renderView();
});

function reloadIfDateChanged(){
  const currentDate = todayKey();
  if(state.dashboardDate !== currentDate){
    state.cases = [];
    state.dashboardDate = currentDate;
    if(state.view === "dashboard") renderView();
    loadCases();
  }
}
setInterval(reloadIfDateChanged, 60000);

// ====================== INIT ======================
loadCases();
</script>
</body>
</html>
